name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: pip install pytest

      - name: Syntax check (all modules)
        run: python -m py_compile run.py core/*.py modules/*.py tools/*.py

      - name: Unit tests (pure core helpers, no network/keys)
        run: pytest tests/test_units.py -v
